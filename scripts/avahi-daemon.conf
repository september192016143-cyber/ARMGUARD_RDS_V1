[server]
host-name=armguard
domain-name=local
use-ipv4=yes
use-ipv6=no
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[wide-area]
enable-wide-area=no

[publish]
publish-addresses=yes
publish-hinfo=no
publish-workstation=no
publish-domain=yes

[reflector]
# enable-reflector=yes is required when devices are on two different subnets
# (e.g. switch-side 192.168.0.x AND HomeRouter wireless 192.168.1.x).
# With reflector on, mDNS (armguard.local) queries are forwarded between the
# server's network interface and the HomeRouter's LAN segment so all clients
# can resolve the hostname regardless of which subnet they are on.
enable-reflector=yes

[rlimits]
rlimit-core=0
rlimit-data=4194304
rlimit-fsize=0
rlimit-nofile=768
rlimit-stack=4194304
rlimit-nproc=3
