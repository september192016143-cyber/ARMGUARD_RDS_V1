# =============================================================================
# ArmGuard RDS V1 — Nginx Config: Self-Signed SSL, LAN-only (192.168.0.11)
# Generated for: /etc/nginx/sites-available/armguard
#
# To apply on the server:
#   sudo cp /var/www/ARMGUARD_RDS_V1/scripts/nginx-armguard-ssl-lan.conf \
#            /etc/nginx/sites-available/armguard
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

limit_req_zone $binary_remote_addr zone=armguard_login:10m rate=5r/m;

upstream armguard_app {
    server 127.0.0.1:8000;
    keepalive 8;
}

# --------------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# --------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name 192.168.0.11;
    return 301 https://$host$request_uri;
}

# --------------------------------------------------------------------------
# HTTPS — main application server
# --------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 192.168.0.11;

    server_tokens off;
    client_max_body_size 20M;

    # --- Self-signed SSL certificate ---
    ssl_certificate     /etc/ssl/certs/armguard-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/armguard-selfsigned.key;
    ssl_dhparam         /etc/ssl/certs/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "same-origin" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/html text/xml
               application/json application/javascript
               application/xml application/xml+rss text/javascript;

    # --- Static files (served directly, bypass Gunicorn) ---
    location /static/ {
        alias /var/www/ARMGUARD_RDS_V1/project/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip on;
        gzip_types text/css application/javascript application/json;
    }

    # --- Media files ---
    location /media/ {
        alias /var/www/ARMGUARD_RDS_V1/project/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        location ~* \.(php|py|sh|cgi|rb|pl)$ {
            deny all;
        }
    }

    # --- Rate-limited login ---
    location /accounts/login/ {
        limit_req zone=armguard_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # --- Django application ---
    location / {
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # --- Block dotfiles and sensitive extensions ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(py|pyc|env|cfg|ini|conf|bak|sql|sqlite3|db)$ {
        deny all;
        return 404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
