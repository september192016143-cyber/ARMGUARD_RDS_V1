# =============================================================================
# ArmGuard RDS V1 — Nginx Config: Self-Signed SSL, LAN-only (192.168.0.11)
# Generated for: /etc/nginx/sites-available/armguard
#
# To apply on the server:
#   sudo cp /var/www/ARMGUARD_RDS_V1/scripts/nginx-armguard-ssl-lan.conf \
#            /etc/nginx/sites-available/armguard
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Rate-limit only POST requests to the login endpoint (actual submit attempts).
# GET requests (page loads, redirects) are excluded via $limit_login_key below.
# LAN-internal app: generous limits (60 POST/min, burst 30) — prevents true
# brute-force while not blocking the admin during normal use or post-deploy
# session loss scenarios.
map $request_method $limit_login_key {
    POST    $binary_remote_addr;
    default "";
}
limit_req_zone $limit_login_key zone=armguard_login:10m rate=60r/m;

upstream armguard_app {
    server 127.0.0.1:8000;
    keepalive 8;
}

# --------------------------------------------------------------------------
# HTTP — proxy camera activation + cert download; redirect everything else
# --------------------------------------------------------------------------
# Why exceptions exist:
#   Android Chrome blocks downloads from HTTPS servers whose certificate is
#   not yet trusted (shows "download paused").  The cert download is needed
#   precisely to establish that trust, so it must be reachable over plain
#   HTTP.  The /camera/activate/ route is also kept on HTTP so that
#   setup_ssl.html is served from an HTTP origin — this avoids the mixed-
#   content block that Chrome would apply to an HTTP <a> link on an HTTPS
#   page.  The SSL certificate is public (broadcast in every TLS handshake),
#   so serving it over HTTP is not a security concern.
server {
    listen 80;
    listen [::]:80;
    server_name 192.168.0.11 armguard.local;

    # Camera QR-code activation flow — keep on HTTP
    location ^~ /camera/activate/ {
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # SSL cert download — keep on HTTP (Android needs it before cert is trusted)
    location = /download/ssl-cert/ {
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------------------------------------------------
# HTTPS — main application server
# --------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 192.168.0.11 armguard.local;

    server_tokens off;
    client_max_body_size 20M;

    # --- File serving performance (SSD-optimised) ---
    # sendfile + tcp_nopush: kernel sends file data directly to socket (zero-copy).
    # tcp_nodelay: disable Nagle algorithm — improves latency for small packets
    # (keepalive responses, AJAX, WebSocket frames).
    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;

    # --- Self-signed SSL certificate ---
    ssl_certificate     /etc/ssl/certs/armguard-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/armguard-selfsigned.key;
    ssl_dhparam         /etc/ssl/certs/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security headers ---
    # NOTE: Content-Security-Policy is intentionally managed by Django's
    # SecurityHeadersMiddleware (middleware/security.py) — do NOT duplicate it
    # here. Two conflicting CSP headers cause the browser to apply the
    # strictest of both, breaking blob: iframe PDF previews.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "same-origin" always;
    # Restrict browser feature access (camera, mic, geolocation not needed by ArmGuard).
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml
               application/json application/javascript
               application/xml application/xml+rss text/javascript;

    # --- Static files (served directly, bypass Gunicorn) ---
    # .mjs files require an explicit MIME type declaration. A server-level
    # types{} block fully replaces the inherited http-level types, which breaks
    # all other assets. Instead, a dedicated regex location is used that only
    # matches .mjs requests, keeping its own types{} isolated from everything
    # else. Nginx regex locations take priority over prefix locations, so .mjs
    # requests are intercepted here before reaching the /static/ block below.
    location ~* "^/static/(.+\.mjs)$" {
        alias /var/www/ARMGUARD_RDS_V1/project/staticfiles/$1;
        default_type text/javascript;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location /static/ {
        alias /var/www/ARMGUARD_RDS_V1/project/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
        access_log off;
        gzip on;
        gzip_types text/css text/javascript application/javascript application/json;
    }

    # --- Media files ---
    location /media/ {
        alias /var/www/ARMGUARD_RDS_V1/project/media/;
        expires 2d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
        access_log off;
        location ~* \.(php|py|sh|cgi|rb|pl)$ {
            deny all;
        }
    }

    # --- Rate-limited login ---
    # The map above sets $limit_login_key to "" for non-POST requests, so only
    # POST submissions count against the rate limit — GET/HEAD are never blocked.
    location /accounts/login/ {
        limit_req zone=armguard_login burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # --- Health check (no rate limit — used by monitoring, load balancers) ---
    location = /health/ {
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
        access_log off;
    }

    # --- Django application ---
    location / {
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # --- Block dotfiles and sensitive extensions ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(py|pyc|env|cfg|ini|conf|bak|sql|sqlite3|db)$ {
        deny all;
        return 404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
