# =============================================================================
# ArmGuard RDS V1 — Nginx Reverse Proxy Configuration
# =============================================================================
# Installation:
#   1. Copy to /etc/nginx/sites-available/armguard
#   2. Edit __DOMAIN__, __LAN_IP__, __STATIC_ROOT__, __MEDIA_ROOT__ below,
#      OR let deploy.sh substitute them automatically.
#   3. Enable: sudo ln -s /etc/nginx/sites-available/armguard \
#                        /etc/nginx/sites-enabled/armguard
#   4. Remove default: sudo rm -f /etc/nginx/sites-enabled/default
#   5. Test: sudo nginx -t
#   6. Reload: sudo systemctl reload nginx
#
# For SSL (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d __DOMAIN__
#   (certbot will update this file with SSL blocks automatically)
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones (defined in http context — Nginx applies globally)
# Rate-limit the login page: 5 requests/minute per IP, burst of 3
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=armguard_login:10m rate=5r/m;

# ---------------------------------------------------------------------------
# Upstream: Gunicorn application server pool
# keepalive 8 — Nginx keeps up to 8 idle connections open to Gunicorn.
# This eliminates a full TCP handshake on every proxied request.
# Requires proxy_http_version 1.1 + proxy_set_header Connection "" in
# proxy-params.conf (deploy.sh creates that file automatically).
# ---------------------------------------------------------------------------
upstream armguard_app {
    server 127.0.0.1:8000;
    keepalive 8;
}

# ---------------------------------------------------------------------------
# HTTP server — redirect all traffic to HTTPS (active once SSL is obtained)
# Comment out this block if running HTTP-only during initial setup.
# ---------------------------------------------------------------------------
# server {
#     listen 80;
#     listen [::]:80;
#     server_name __DOMAIN__ __LAN_IP__;
#
#     # Allow Let's Encrypt ACME challenges
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#     }
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# ---------------------------------------------------------------------------
# HTTP server (initial/LAN-only deployment without SSL)
# Remove this block and uncomment the HTTPS block below once you have a cert.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ __LAN_IP__;

    # Security: hide Nginx version
    server_tokens off;

    # Max upload size (match Django's DATA_UPLOAD_MAX_MEMORY_SIZE)
    client_max_body_size 20M;

    # ---------------------------------------------------------------------------
    # Gzip compression for dynamic responses (HTML pages, JSON from Gunicorn).
    # The /static/ location below has its own gzip block for assets.
    # ---------------------------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/html text/xml
               application/json application/javascript
               application/xml application/xml+rss text/javascript;

    # ---------------------------------------------------------------------------
    # Static files — served directly by Nginx (bypass Gunicorn)
    # ---------------------------------------------------------------------------
    # .mjs files require an explicit MIME type declaration. A server-level
    # types{} block fully replaces the inherited http-level types, which breaks
    # all other assets. Instead, a dedicated regex location is used that only
    # matches .mjs requests, keeping its own types{} isolated from everything
    # else. Nginx regex locations take priority over prefix locations, so .mjs
    # requests are intercepted here before reaching the /static/ block below.
    location ~* "^/static/(.+\.mjs)$" {
        alias __STATIC_ROOT__/$1;
        types { text/javascript  mjs; }
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /static/ {
        alias __STATIC_ROOT__/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Compress text assets
        gzip on;
        gzip_types text/css text/javascript application/javascript application/json;
    }

    location /media/ {
        alias __MEDIA_ROOT__/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;

        # Prevent direct execution of uploaded files
        location ~* \.(php|py|sh|cgi|rb|pl)$ {
            deny all;
        }
    }

    # ---------------------------------------------------------------------------
    # Rate-limited login endpoint
    # ---------------------------------------------------------------------------
    location /accounts/login/ {
        limit_req zone=armguard_login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ---------------------------------------------------------------------------
    # Django application (Gunicorn)
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---------------------------------------------------------------------------
    # Security: deny access to sensitive paths
    # ---------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
        access_log off;
    }

    location = /security.txt {
        proxy_pass http://armguard_app;
        include /etc/nginx/snippets/proxy-params.conf;
        access_log off;
    }

    # Block access to Python/Django internals
    location ~ \.(py|pyc|env|cfg|ini|conf|bak|sql|sqlite3|db)$ {
        deny all;
        return 404;
    }
}

