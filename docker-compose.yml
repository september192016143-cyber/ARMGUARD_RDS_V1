# ── ARMGUARD RDS V1 — docker-compose.yml ────────────────────────────────────
# Development-only compose: builds the image and mounts the source for hot-reload.
# For production, build the image separately and use a real WSGI server (see Dockerfile).
#
# Usage:
#   docker compose up --build       # first run / after requirements.txt changes
#   docker compose up               # subsequent runs
#   docker compose exec web python manage.py createsuperuser
#   docker compose exec web python manage.py migrate

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner        # use the runtime stage (without build tools)
    command: >
      python manage.py runserver 0.0.0.0:8000
    volumes:
      # Mount source for live-reloading in development.
      - ./project:/app
      # Persist SQLite database and media files between container restarts.
      - armguard_db:/app/db
      - armguard_media:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: armguard.settings.development
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  armguard_db:
  armguard_media:
