# .github/workflows/ci.yml
# ARMGUARD RDS V1 — Continuous Integration
#
# Runs on every push to main/develop and every pull request targeting main.
# Steps:
#   1. Lint (flake8)
#   2. Test (manage.py test) with coverage
#   3. Upload coverage XML to Codecov (optional — skipped if token absent)
#   4. Security scan (pip-audit against known CVEs)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint · Test · Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: final/ARMGUARD_RDS_V1/project

    env:
      DJANGO_SETTINGS_MODULE: armguard.settings.development
      DJANGO_SECRET_KEY: ci-insecure-key-not-for-production
      PYTHONUNBUFFERED: "1"

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r armguard/requirements.txt
          pip install coverage flake8 pip-audit

      # ── 3. Lint ────────────────────────────────────────────────────────────
      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names (E9xx, F63x, F7xx, F82x)
          flake8 armguard --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail (max 120 chars per line)
          flake8 armguard --count --max-line-length=120 --statistics --exit-zero

      # ── 4. Run tests with coverage ─────────────────────────────────────────
      - name: Run test suite
        run: |
          coverage run --rcfile=.coveragerc manage.py test armguard.tests --verbosity=2

      - name: Print coverage report
        run: coverage report --rcfile=.coveragerc

      - name: Generate coverage XML
        run: coverage xml --rcfile=.coveragerc

      # ── 5. Upload to Codecov (optional) ────────────────────────────────────
      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      # ── 6. Security scan ───────────────────────────────────────────────────
      - name: Security audit (pip-audit)
        run: |
          pip-audit -r armguard/requirements.txt --strict
        continue-on-error: true   # Warn but don't fail build on first detection

  # ---------------------------------------------------------------------------
  # Docker build smoke test (validates Dockerfile syntax + build)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg DJANGO_SECRET_KEY=ci-insecure-key \
            -t armguard-rds:ci \
            final/ARMGUARD_RDS_V1

      - name: Verify image starts
        run: |
          docker run --rm \
            -e DJANGO_SECRET_KEY=ci-insecure-key \
            -e DJANGO_SETTINGS_MODULE=armguard.settings.development \
            armguard-rds:ci \
            python manage.py check --deploy 2>&1 || true
        # `|| true` — check --deploy warns about prod settings (HTTPS etc.) which
        # we don't have in CI; the goal is just to confirm the image runs.
