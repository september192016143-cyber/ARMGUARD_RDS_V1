<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ArmGuard — Camera Upload</title>
  <!-- HMAC rotating API key (5-minute window). JS reads this; page reloads when it expires. -->
  <meta name="x-camera-key"         content="{{ current_api_key }}">
  <meta name="x-camera-key-expires" content="{{ key_expires_ms }}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: .25rem; color: #f8fafc; }
    p.sub { font-size: .8rem; color: #94a3b8; margin-bottom: 1.5rem; }
    label.drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      border: 2px dashed #334155;
      border-radius: .75rem;
      padding: 2rem 1rem;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    label.drop-zone:hover, label.drop-zone.dragover { border-color: #f97316; background: #1a2744; }
    label.drop-zone span { font-size: .85rem; color: #94a3b8; text-align: center; }
    label.drop-zone strong { font-size: 1rem; color: #f8fafc; }
    #preview-wrap { margin-top: 1rem; display: none; }
    #preview { width: 100%; border-radius: .5rem; max-height: 280px; object-fit: contain; }
    input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .btn {
      display: block; width: 100%; margin-top: 1.2rem;
      background: #f97316; color: #fff; border: none; border-radius: .6rem;
      padding: .8rem; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #ea6f10; }
    .btn:disabled { background: #475569; cursor: not-allowed; }
    #status {
      margin-top: 1rem; font-size: .85rem; text-align: center;
      min-height: 1.4rem;
    }
    #status.ok  { color: #4ade80; }
    #status.err { color: #f87171; }
    .thumb-list { margin-top: 1.2rem; display: flex; flex-wrap: wrap; gap: .5rem; }
    .thumb-list img { width: 70px; height: 70px; object-fit: cover; border-radius: .4rem; border: 2px solid #334155; }
    .device-badge { font-size: .72rem; color: #64748b; margin-bottom: 1rem; text-align: center; }
    .device-badge span { color: #4ade80; font-weight: 600; }
    .key-bar { font-size: .65rem; color: #475569; text-align: center; margin-top: .5rem; }
  </style>
</head>
<body>
<div class="card">
  <h1>&#128247; ArmGuard Camera Upload</h1>
  <p class="sub">Take or choose a photo — it will be saved to the armory server.</p>

  <div class="device-badge">
    Device: <span>{{ device.device_name|default:"unnamed" }}</span>
    &bull; {{ device.user.username }}
    <div class="key-bar" id="key-timer">Key valid for <span id="key-countdown">--</span>s</div>
  </div>

  <form id="upload-form" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <label class="drop-zone" id="drop-zone">
      <strong>Tap to capture / browse</strong>
      <span>JPG, PNG, WEBP &bull; max 15 MB</span>
      <input type="file" id="image-input" name="image"
             accept="image/jpeg,image/png,image/gif,image/webp"
             capture="environment">
    </label>

    <div id="preview-wrap">
      <img id="preview" src="" alt="preview">
    </div>

    <button class="btn" id="submit-btn" type="submit" disabled>Upload Photo</button>
    <div id="status"></div>
    <div class="thumb-list" id="thumb-list"></div>
  </form>
</div>

<script>
(function () {
  var input      = document.getElementById('image-input');
  var previewWrap= document.getElementById('preview-wrap');
  var preview    = document.getElementById('preview');
  var submitBtn  = document.getElementById('submit-btn');
  var statusEl   = document.getElementById('status');
  var thumbList  = document.getElementById('thumb-list');
  var dropZone   = document.getElementById('drop-zone');
  var form       = document.getElementById('upload-form');

  // ── Rotating API key ───────────────────────────────────────────────────────
  // Read from <meta> tags injected server-side. The key is a 5-minute HMAC
  // window — when it expires the page reloads to fetch a fresh one.
  var apiKey     = document.querySelector('meta[name="x-camera-key"]').getAttribute('content');
  var expiresAt  = parseInt(document.querySelector('meta[name="x-camera-key-expires"]').getAttribute('content'), 10);
  var countdown  = document.getElementById('key-countdown');

  function updateCountdown() {
    var remaining = Math.max(0, Math.round((expiresAt - Date.now()) / 1000));
    if (countdown) countdown.textContent = remaining;
    if (remaining <= 0) {
      // Key expired — reload page silently to get the new key
      window.location.reload();
    }
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  function setStatus(msg, ok) {
    statusEl.textContent = msg;
    statusEl.className = ok ? 'ok' : 'err';
  }

  // Show preview when file chosen
  input.addEventListener('change', function () {
    if (!input.files || !input.files[0]) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      preview.src = e.target.result;
      previewWrap.style.display = '';
      submitBtn.disabled = false;
      statusEl.textContent = '';
    };
    reader.readAsDataURL(input.files[0]);
  });

  // Drag-and-drop visual cue (desktop / tablet)
  dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('dragover'); });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer && e.dataTransfer.files[0]) {
      input.files = e.dataTransfer.files;
      input.dispatchEvent(new Event('change'));
    }
  });

  // AJAX submit
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!input.files || !input.files[0]) return;

    submitBtn.disabled = true;
    setStatus('Uploading\u2026', true);

    var data = new FormData(form);
    fetch('{% url "camera:upload_image" %}', {
      method: 'POST',
      headers: {
        'X-Requested-With': 'XMLHttpRequest',
        'X-Api-Key': apiKey,
      },
      body: data,
    })
    .then(function (r) { return r.json(); })
    .then(function (json) {
      if (json.success) {
        setStatus('Uploaded successfully!', true);
        // Add thumbnail
        var img = document.createElement('img');
        img.src = json.url;
        img.title = json.filename;
        thumbList.prepend(img);
        // Reset form for next photo
        input.value = '';
        preview.src = '';
        previewWrap.style.display = 'none';
        submitBtn.disabled = true;
      } else {
        setStatus('Error: ' + (json.error || 'Unknown error'), false);
        submitBtn.disabled = false;
      }
    })
    .catch(function () {
      setStatus('Network error. Check your connection.', false);
      submitBtn.disabled = false;
    });
  });
})();
</script>
</body>
</html>
